<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Goals | FitNest</title>
    <link rel="icon" href="/assets/logos/fitnest logo dark.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/darkmode.css">
    <script src="../assets/js/session.js"></script>
    <script defer src="../assets/js/updategoals.js"></script>
    <style>
        :root {
            --primary: #4b085f;
            --secondary: #3f37c9;
            --accent: #4895ef;
            --light: #f8f9fa;
            --dark: #212529;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
        }

        /* Light Mode (Default) */
        [data-theme="light"] {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #666666;
            --sidebar-bg: linear-gradient(135deg, #4b085f, #3f37c9);
            --sidebar-text: #ffffff;
            --header-bg: #ffffff;
            --dropdown-bg: #ffffff;
            --dropdown-hover: #f1f1f1;
            --card-shadow: rgba(0,0,0,0.05);
            --card-shadow-hover: rgba(0,0,0,0.1);
            --border-color: #dee2e6;
            --input-bg: #ffffff;
            --input-border: #dee2e6;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-primary: #272727;
            --bg-secondary: #332f2f;
            --bg-tertiary: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --sidebar-bg: linear-gradient(135deg, #1a1620, #1a1620);
            --sidebar-text: #ffffff;
            --header-bg: #332f2f;
            --dropdown-bg: #332f2f;
            --dropdown-hover: #3f3f3f;
            --card-shadow: rgba(0,0,0,0.3);
            --card-shadow-hover: rgba(162,0,255,0.3);
            --border-color: #444444;
            --input-bg: #1f1f1f;
            --input-border: #444444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 2rem 1rem;
            box-shadow: 2px 0 10px var(--card-shadow);
            position: fixed;
            height: 100%;
            transition: background 0.3s ease;
        }
        
        .logo-btn {
            background: transparent;
            border: none;
            margin-bottom: 2rem;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        
        .logo-btn img {
            max-width: 80%;
            height: auto;
        }
        
        .sidebar ul {
            list-style: none;
        }
        
        .sidebar li {
            padding: 0.8rem 1rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        
        .sidebar li:hover {
            background-color: rgba(255,255,255,0.1);
        }
        
        .sidebar li.active {
            background-color: rgba(255,255,255,0.2);
        }
        
        /* Main Content Styles */
        .main {
            flex: 1;
            margin-left: 250px;
            padding: 2rem;
        }
        
        .header {
            margin-bottom: 2rem;
            background: var(--header-bg);
            padding: 1rem;
            border-radius: 12px;
            transition: background-color 0.3s ease;
        }
        
        .header h1 {
            color: #a200ff;
            font-size: 2rem;
            font-weight: 600;
        }
        
        /* Form Styles */
        #update-goals-form {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px var(--card-shadow);
            color: var(--text-primary);
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        input, select {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 1rem;
        }
        
        input:disabled {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
        }
        
        .button-group {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        
        .workout-goal-btn {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .workout-goal-btn:hover {
            background: var(--dropdown-hover);
        }
        
        .workout-goal-btn.active {
            background: #a200ff;
            color: white;
        }
        
        button[type="submit"] {
            background: #a200ff;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
        }
        
        button[type="submit"]:hover {
            background: #8900d3;
            transform: translateY(-2px);
        }

        /* Dark Mode Overrides */
        [data-theme="dark"] #update-goals-form,
        [data-theme="dark"] .header {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        [data-theme="dark"] .header h1 {
            color: #a200ff;
        }

        [data-theme="dark"] label {
            color: var(--text-primary);
        }

        [data-theme="dark"] input,
        [data-theme="dark"] select {
            background: var(--input-bg);
            color: var(--text-primary);
            border-color: var(--input-border);
        }

        [data-theme="dark"] input:disabled {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        [data-theme="dark"] .workout-goal-btn {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        [data-theme="dark"] .workout-goal-btn:hover {
            background: #444444;
        }

        [data-theme="dark"] .workout-goal-btn.active {
            background: #a200ff;
            color: white;
        }

        [data-theme="dark"] button[type="submit"] {
            background: #a200ff;
        }

        [data-theme="dark"] button[type="submit"]:hover {
            background: #8900d3;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            
            .main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <button class="logo-btn" onclick="location.href='/pages/dashboard.html'">
            <img src="../assets/logos/fitnest.png" alt="FitNest Logo">
        </button>
        <ul>
            <li onclick="location.href='/pages/dashboard.html'">🏠 Dashboard</li>
            <li onclick="location.href='/pages/workouts.html'">💪 Workouts</li>
            <li onclick="location.href='/pages/cardio.html'">🏃 Cardio</li>
            <li onclick="location.href='/pages/diet_plan.html'">🥗 Diet</li>
            <li onclick="location.href='/pages/updategoals.html'" class="active">🎯 Goals</li>
            <li onclick="location.href='/pages/sleep.html'">💤 Sleep</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="header">
            <div>
                <h1>Update Your Goals</h1>
                <p>Set your fitness targets and personal metrics</p>
            </div>
            <div class="header-controls">
                <div class="dark-mode-toggle">
                    <label for="darkModeToggle" class="toggle-label">🌙</label>
                    <input type="checkbox" id="darkModeToggle" class="toggle-checkbox">
                </div>
                <div class="user-menu">
                    <button id="userIcon"><i class="fas fa-user"></i></button>
                    <div class="dropdown" id="userDropdown">
                        <a href="/pages/logout.html">Log Out</a>
                    </div>
                </div>
            </div>
        </header>

        <form id="update-goals-form">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" name="height" required disabled>

            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" name="weight" required>

            <label for="bmi">BMI:</label>
            <input type="number" id="bmi" name="bmi" required disabled>

            <label for="bmr">BMR:</label>
            <input type="number" id="bmr" name="bmr" required disabled>

            <label for="maintenance-calories">Maintenance Calories:</label>
            <input type="number" id="maintenance-calories" name="maintenance-calories" required disabled>

            <label for="heart-rate">Heart Rate (bpm):</label>
            <input type="number" id="heart-rate" name="heart-rate" required>

            <label for="sleep-hours">Sleep Hours:</label>
            <input type="number" id="sleep-hours" name="sleep-hours" required>

            <label for="activity-level">Activity Level:</label>
            <select id="activity-level" name="activity-level" required>
                <option value="1.2">Sedentary (little to no exercise)</option>
                <option value="1.375">Lightly Active (light exercise or sports 1-3 days/week)</option>
                <option value="1.55">Moderately Active (moderate exercise or sports 3-5 days/week)</option>
                <option value="1.725">Very Active (hard exercise or sports 6-7 days a week)</option>
                <option value="1.9">Super Active (very hard exercise or a physical job)</option>
            </select>

            <label>Workout Goal:</label>
            <div class="button-group">
                <button type="button" id="gain-muscle" class="workout-goal-btn" data-goal="gain muscle">Gain Muscle</button>
                <button type="button" id="lose-weight" class="workout-goal-btn" data-goal="lose weight">Lose Weight</button>
                <button type="button" id="maintain-fitness" class="workout-goal-btn" data-goal="maintain fitness">Maintain Fitness</button>
            </div>
            <input type="hidden" id="workout-goal" name="workout-goal" value="maintain fitness">

            <button type="submit">Save Changes</button>
        </form>
    </main>
</div>
<script src="../assets/js/darkmode.js"></script>
<script>
  // Quick auth check
  if (!hasValidSessionLocal()) {
    window.location.href = '/';
  }
</script>
</body>
</html>
