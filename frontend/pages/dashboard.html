<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FitNest</title>
    <link rel="icon" href="/assets/logos/fitnest logo dark.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4b085f;
            --secondary: #3f37c9;
            --accent: rgb(96, 16, 133);
            --light: #f8f9fa;
            --dark: #212529;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
        }

        /* Light Mode (Default) */
        [data-theme="light"] {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #666666;
            --sidebar-bg: linear-gradient(135deg, #4b085f, #3f37c9);
            --sidebar-text: #ffffff;
            --header-bg: #ffffff;
            --dropdown-bg: #ffffff;
            --dropdown-hover: #f1f1f1;
            --chart-shadow: rgba(0,0,0,0.05);
            --chart-shadow-hover: rgba(0,0,0,0.1);
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-primary: #272727;
            --bg-secondary: #332f2f;
            --bg-tertiary: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --sidebar-bg: linear-gradient(135deg, #1a1620, #1a1620);
            --sidebar-text: #ffffff;
            --header-bg: #332f2f;
            --dropdown-bg: #332f2f;
            --dropdown-hover: #3f3f3f;
            --chart-shadow: rgba(0,0,0,0.3);
            --chart-shadow-hover: rgba(162,0,255,0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 2rem 1rem;
            box-shadow: 2px 0 10px var(--chart-shadow);
            position: fixed;
            height: 100%;
            transition: background 0.3s ease;
        }
        
        .logo-btn {
            background: transparent;
            border: none;
            margin-bottom: 2rem;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        
        .logo-btn img {
            max-width: 80%;
            height: auto;
        }
        
        .sidebar ul {
            list-style: none;
        }
        
        .sidebar li {
            padding: 0.8rem 1rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            color: var(--sidebar-text);
        }
        
        .sidebar li:hover {
            background-color: rgba(255,255,255,0.1);
        }
        
        .sidebar li.active {
            background-color: rgba(255,255,255,0.2);
        }
        
        /* Main Content Styles */
        .main {
            flex: 1;
            margin-left: 250px;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--header-bg);
            padding: 1rem;
            border-radius: 12px;
            transition: background-color 0.3s ease;
        }
        
        .header h1 {
            color: #a200ff;
            font-size: 2rem;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .user-menu {
            position: relative;
        }
        #userName {
            font-weight: 500;
            color: #a200ff;
        }
        
        #userIcon {
            background: #a200ff;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        #userIcon:hover {
            background: #8900d3;
        }
        
        .dropdown {
            display: none;
            position: absolute;
            right: 0;
            background: var(--dropdown-bg);
            color: var(--text-primary);
            min-width: 160px;
            box-shadow: 0 8px 16px var(--chart-shadow);
            border-radius: 8px;
            z-index: 1;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        
        .dropdown a {
            color: var(--text-primary);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background 0.3s;
        }
        
        .dropdown a:hover {
            background: var(--dropdown-hover);
        }
        
        .user-menu:hover .dropdown {
            display: block;
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toggle-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 50px;
            height: 28px;
            background-color: #ccc;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            transition: background-color 0.3s ease;
            border: none;
        }

        .toggle-checkbox:checked {
            background-color: #a200ff;
        }

        .toggle-checkbox::before {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: white;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }

        .toggle-checkbox:checked::before {
            left: 24px;
        }

        .toggle-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
        }
        
        /* Charts Area */
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .chart-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px var(--chart-shadow);
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s ease;
            color: var(--text-primary);
        }
        
        .chart-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--chart-shadow-hover);
        }
        
        .chart-box h3 {
            color: #a200ff;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        
        .stats {
            display: flex;
            flex-direction: column;
        }
        
        .stats p {
            margin: 0.3rem 0;
            padding: 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            color: var(--text-secondary);
            transition: background-color 0.3s ease;
        }
        
        .stats h3 {
            margin-top: 1rem;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            
            .main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <button class="logo-btn" onclick="location.href='/pages/dashboard.html'">
            <img src="../assets/logos/fitnest.png" alt="FitNest Logo">
        </button>
        <ul>
            <li onclick="location.href='/pages/dashboard.html'" class="active">🏠 Dashboard</li>
            <li onclick="location.href='/pages/workouts.html'">💪 Workouts</li>
            <li onclick="location.href='/pages/cardio.html'">🏃 Cardio</li>
            <li onclick="location.href='/pages/diet_plan.html'">🥗 Diet</li>
            <li onclick="location.href='/pages/updategoals.html'">🎯 Goals</li>
            <li onclick="location.href='/pages/sleep.html'">💤 Sleep</li>
        </ul>
    </aside>

    <!-- Main Dashboard -->
    <main class="main">
        <header class="header">
            <h1>FitNest Dashboard</h1>
            <div class="header-controls">
                <div class="dark-mode-toggle">
                    <label for="darkModeToggle" class="toggle-label">🌙</label>
                    <input type="checkbox" id="darkModeToggle" class="toggle-checkbox">
                </div>
                <div class="user-menu">
                    <!-- <span id="userName" style="margin-right: 1rem;"></span> -->
                    <button id="userIcon"><i class="fas fa-user"></i></button>
                    <div class="dropdown" id="userDropdown">
                        <!-- <a href="profile.html">Profile</a>
                        <a href="settings.html">Settings</a> -->
                        <a href="/pages/logout.html">Log Out</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Charts Area -->
        <section class="charts">
            <div class="chart-box" >
                <h3>Burnt Calories</h3>
                <canvas id="burnChart"></canvas>
            </div>
            <div class="chart-box" >
                <h3>Consumed Calories</h3>
                <canvas id="gainChart"></canvas>
            </div>
            <div class="chart-box" >
                <h3>Daily Step Count</h3>
                <canvas id="stepChart"></canvas>
            </div>
            <div class="chart-box stats" >
                <h3>Your Stats</h3>
                <p id="weight"></p>
                <p id="bmi"></p>
                <p id="bmr"></p>
                <p id="heart_rate"></p>
                <p id="sleep"></p>
                
                <h3>Fitness Goals</h3>
                <p id="goal"></p>
                <p id="level"></p>
                
                <h3>Progress</h3>
                <p id="totalCaloriesBurnt">Calories Burnt: Loading...</p>
                <p id="totalStepsCompleted">Steps Completed: Loading...</p>
                <p id="heartPoints">Heart Points: Loading...</p>
            </div>
        </section>
    </main>
</div>

<script src="../assets/js/session.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script src="../assets/js/darkmode.js"></script>
<script>
  // Quick auth check - use async verification in background
  if (!hasValidSessionLocal()) {
    window.location.href = '/';
  }
  // Verify with backend in background (non-blocking)
  checkSession().then(session => {
    if (!session.isValid) {
      window.location.href = '/';
    }
  });
</script>
</body>
</html>
