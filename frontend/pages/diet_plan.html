<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Plan | FitNest</title>
    <link rel="icon" href="/assets/logos/fitnest logo dark.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/darkmode.css">
    <script src="../assets/js/session.js"></script>
    <script defer src="../assets/js/diet_plan.js"></script>
    <style>
        :root {
            --primary: #4b085f;
            --secondary: #3f37c9;
            --accent: #4895ef;
            --light: #f8f9fa;
            --dark: #212529;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --food-green: #2ecc71;
            --food-orange: #e67e22;
            --food-blue: #3498db;
        }

        /* Light Mode (Default) */
        [data-theme="light"] {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #666666;
            --sidebar-bg: linear-gradient(135deg, #4b085f, #3f37c9);
            --sidebar-text: #ffffff;
            --header-bg: #ffffff;
            --dropdown-bg: #ffffff;
            --dropdown-hover: #f1f1f1;
            --card-shadow: rgba(0,0,0,0.05);
            --card-shadow-hover: rgba(0,0,0,0.1);
            --border-color: #dee2e6;
            --input-bg: #ffffff;
            --input-border: #dee2e6;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-primary: #272727;
            --bg-secondary: #332f2f;
            --bg-tertiary: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --sidebar-bg: linear-gradient(135deg, #1a1620, #1a1620);
            --sidebar-text: #ffffff;
            --header-bg: #332f2f;
            --dropdown-bg: #332f2f;
            --dropdown-hover: #3f3f3f;
            --card-shadow: rgba(0,0,0,0.3);
            --card-shadow-hover: rgba(162,0,255,0.3);
            --border-color: #444444;
            --input-bg: #1f1f1f;
            --input-border: #444444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 2rem 1rem;
            box-shadow: 2px 0 10px var(--card-shadow);
            position: fixed;
            height: 100%;
            transition: background 0.3s ease;
        }
        
        .logo-btn {
            background: transparent;
            border: none;
            margin-bottom: 2rem;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        
        .logo-btn img {
            max-width: 80%;
            height: auto;
        }
        
        .sidebar ul {
            list-style: none;
        }
        
        .sidebar li {
            padding: 0.8rem 1rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        
        .sidebar li:hover {
            background-color: rgba(255,255,255,0.1);
        }
        
        .sidebar li.active {
            background-color: rgba(255,255,255,0.2);
        }
        
        /* Main Content Styles */
        .main {
            flex: 1;
            margin-left: 250px;
            padding: 2rem;
        }
        
        .header {
            margin-bottom: 2rem;
            background: var(--header-bg);
            padding: 1rem;
            border-radius: 12px;
            transition: background-color 0.3s ease;
        }
        
        .header h1 {
            color: #a200ff;
            font-size: 2rem;
            font-weight: 600;
        }
        
        /* Controls */
        .meal-plan-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }
        
        /* Meal Plan Table */
        .meal-plan {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px var(--card-shadow);
            overflow-x: auto;
            color: var(--text-primary);
        }
        
        #mealPlanStatus {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border-radius: 8px;
            text-align: center;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        th {
            background-color: #4b085f;
            color: white;
            font-weight: 500;
        }
        
        tr:nth-child(even) {
            background-color: var(--bg-tertiary);
        }
        
        tr:hover {
            background-color: var(--dropdown-hover);
        }
        
        /* Meal Items Styles */
        .meal-items {
            vertical-align: top;
            padding: 8px 15px;
        }
        
        .meal-item {
            margin-bottom: 8px;
            padding: 8px;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 4px;
        }
        
        .meal-item:last-child {
            margin-bottom: 0;
        }
        
        .calories {
            color: var(--primary);
            font-weight: 500;
        }
        
        .total-calories {
            font-weight: 600;
            color: var(--primary);
        }
        
        /* Today's Meal Items Styles */
        .todays-meals {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px var(--card-shadow);
            color: var(--text-primary);
        }
        
        .todays-meals h2 {
            color: #a200ff;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 2px solid #a200ff;
            padding-bottom: 0.5rem;
        }
        
        .meals-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .meal-section {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 1.5rem;
            border-left: 4px solid #a200ff;
            color: var(--text-primary);
        }
        
        .meal-section h3 {
            color: #a200ff;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .meal-items-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .meal-item-today {
            background: var(--bg-secondary);
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }
        
        .meal-item-today:hover {
            box-shadow: 0 2px 4px var(--card-shadow-hover);
            transform: translateY(-1px);
        }
        
        .meal-item-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .meal-item-calories {
            color: #a200ff;
            font-weight: 600;
            background: rgba(162, 0, 255, 0.1);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
        }
        
        .no-items {
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            padding: 1rem;
            margin: 0;
        }
        
        .total-calories-summary {
            background: linear-gradient(135deg, #4b085f, #3f37c9);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .total-calories-summary h3 {
            margin: 0;
            font-size: 1.4rem;
        }
        
        .total-calories-summary span {
            font-size: 1.6rem;
            font-weight: 700;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .meals-container {
                grid-template-columns: 1fr;
            }
        }
        
        /* Color coding for different meal types */
        .meal-items:nth-child(2) .meal-item { /* Breakfast */
            border-left: 3px solid var(--food-orange);
        }
        
        .meal-items:nth-child(3) .meal-item { /* Lunch */
            border-left: 3px solid var(--food-green);
        }
        
        .meal-items:nth-child(4) .meal-item { /* Dinner */
            border-left: 3px solid var(--food-blue);
        }
        
        /* Meals Completed */
        .meals-completed {
            margin-top: 2rem;
            text-align: center;
        }
        
        #totalCaloriesToday {
            font-weight: 600;
            color: var(--primary);
            margin-top: 1rem;
            font-size: 1.1rem;
        }
        
        /* Sticky Note */
        .sticky-note {
            position: fixed;
            width: 300px;
            min-width: 200px;
            min-height: 200px;
            background: #fff9c4;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px var(--card-shadow);
            border-left: 5px solid #ffd54f;
            resize: both;
            overflow: auto;
            cursor: move;
            z-index: 1000;
            display: none;
            color: #212529;
        }

        .sticky-note.active {
            display: block;
        }

        .sticky-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: move;
        }

        .sticky-header h3 {
            margin: 0;
            color: #4b085f;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--danger);
            padding: 0 5px;
        }

        .sticky-note textarea {
            width: 100%;
            height: calc(100% - 80px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: none;
            margin-bottom: 10px;
            font-family: 'Poppins', sans-serif;
        }

        .sticky-note .btn {
            width: 100%;
            padding: 8px;
        }

        .restore-sticky-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .restore-sticky-btn:hover {
            background: var(--secondary);
        }
        
        /* Dark Mode Overrides */
        [data-theme="dark"] .meal-plan,
        [data-theme="dark"] .todays-meals {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        [data-theme="dark"] .todays-meals h2,
        [data-theme="dark"] .meal-section h3,
        [data-theme="dark"] .header h1 {
            color: #a200ff;
        }

        [data-theme="dark"] .header {
            color: var(--text-primary);
        }

        [data-theme="dark"] table {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        [data-theme="dark"] th {
            background: #a200ff;
            color: white;
        }

        [data-theme="dark"] th, 
        [data-theme="dark"] td {
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        [data-theme="dark"] tr:nth-child(even) {
            background: var(--bg-tertiary);
        }

        [data-theme="dark"] tr:hover {
            background: var(--bg-tertiary);
        }

        [data-theme="dark"] .meal-item {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        [data-theme="dark"] .meal-section {
            background: var(--bg-tertiary);
            border-color: #a200ff;
        }

        [data-theme="dark"] .meal-item-today {
            background: var(--input-bg);
            color: var(--text-secondary);
        }

        [data-theme="dark"] #mealPlanStatus {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        [data-theme="dark"] .btn {
            background: #a200ff;
        }

        [data-theme="dark"] .btn:hover {
            background: #8900d3;
        }

        [data-theme="dark"] .restore-sticky-btn {
            background: #a200ff;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            
            .main {
                margin-left: 0;
            }
            
            .sticky-note {
                position: static;
                width: auto;
                margin-top: 2rem;
                resize: none;
            }

            .restore-sticky-btn {
                position: static;
                margin-top: 1rem;
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <button class="logo-btn" onclick="location.href='/pages/dashboard.html'">
            <img src="../assets/logos/fitnest.png" alt="FitNest Logo">
        </button>
        <ul>
            <li onclick="location.href='/pages/dashboard.html'">🏠 Dashboard</li>
            <li onclick="location.href='/pages/workouts.html'">💪 Workouts</li>
            <li onclick="location.href='/pages/cardio.html'">🏃 Cardio</li>
            <li onclick="location.href='/pages/diet_plan.html'" class="active">🥗 Diet</li>
            <li onclick="location.href='/pages/updategoals.html'">🎯 Goals</li>
            <li onclick="location.href='/pages/sleep.html'">💤 Sleep</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="header">
            <div>
                <h1>Diet Plan</h1>
                <p>Your personalized nutrition guide</p>
            </div>
            <div class="header-controls">
                <div class="dark-mode-toggle">
                    <label for="darkModeToggle" class="toggle-label">🌙</label>
                    <input type="checkbox" id="darkModeToggle" class="toggle-checkbox">
                </div>
                <div class="user-menu">
                    <button id="userIcon"><i class="fas fa-user"></i></button>
                    <div class="dropdown" id="userDropdown">
                        <a href="/pages/logout.html">Log Out</a>
                    </div>
                </div>
            </div>
        </header>

        <div class="meal-plan-controls">
            <button id="generateMealPlan" class="btn">Generate Meal Plan</button>
            <button id="shuffleToday" class="btn">Shuffle Today's Meals</button>
            <button id="shuffleWeek" class="btn">Shuffle Week's Meals</button>
            <button id="addCustomMealBtn" class="btn" onclick="window.location.href='/pages/add_custom_meal.html'">
                Add Custom Meal
            </button>
            
        
        </div>

        <div class="meal-plan">
            <div id="mealPlanStatus"></div>
            <table id="mealPlanTable">
                <thead>
                    <tr>
                        <th>Day</th>
                        <th>Breakfast</th>
                        <th>Lunch</th>
                        <th>Dinner</th>
                        <th>Total Calories</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic content will be inserted here -->
                </tbody>
            </table>
        </div>

        <!-- Today's Meal Items Section -->
        <div class="todays-meals">
            <h2>Today's Meal Items</h2>
            <div class="meals-container">
                <div class="meal-section">
                    <h3>🍳 Breakfast</h3>
                    <div id="todaysBreakfast" class="meal-items-list">
                        <!-- Breakfast items will be populated here -->
                    </div>
                </div>
                <div class="meal-section">
                    <h3>🥗 Lunch</h3>
                    <div id="todaysLunch" class="meal-items-list">
                        <!-- Lunch items will be populated here -->
                    </div>
                </div>
                <div class="meal-section">
                    <h3>🍽️ Dinner</h3>
                    <div id="todaysDinner" class="meal-items-list">
                        <!-- Dinner items will be populated here -->
                    </div>
                </div>
                <div class="meal-section">
                    <h3>🍎 Custom Meals</h3>
                    <div id="todaysCustomMeals" class="meal-items-list">
                        <!-- Custom meal items will be populated here -->
                    </div>
                </div>
            </div>
            <div class="total-calories-summary">
                <h3>Total Calories Consumed Today: <span id="totalCaloriesConsumed">0</span> kcal</h3>
            </div>
        </div>

        <div class="meals-completed">
            <button id="mealsCompletedToday" class="btn">✅ Mark Meals as Completed</button>
            <p id="totalCaloriesToday"></p>
        </div>

        <div class="sticky-note" id="stickyNote">
            <div class="sticky-header">
                <h3>Nutrition Notes</h3>
                <button class="close-btn">&times;</button>
            </div>
            <textarea id="nutritionNotes" placeholder="Write your nutrition notes here..."></textarea>
            <button id="saveNotes" class="btn">Save Notes</button>
        </div>

        <button id="restoreStickyBtn" class="restore-sticky-btn">📝 Show Notes</button>
    </main>
</div>
<script src="../assets/js/darkmode.js"></script>
<script>
  // Quick auth check
  if (!hasValidSessionLocal()) {
    window.location.href = '/';
  }
</script>
</body>
</html>
